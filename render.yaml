services:
  - type: web
    name: ez-trucks-api
    env: node
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: API_PUBLIC_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: MOLLIE_API_KEY
        sync: false
      - key: POSTMARK_SERVER_TOKEN
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: ADMIN_ORDER_EMAIL
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: ADMIN_AUTH_SECRET
        sync: false
      - key: ADMIN_TOKEN_TTL_SECONDS
        value: 28800
